# coturn TURN server — production config
# Replace all <PLACEHOLDER> values before deploying

listening-port=3478
tls-listening-port=5349

# Your server's public IPv4 address
external-ip=<YOUR_PUBLIC_IP>

# Your domain (used in TLS cert and realm)
realm=<YOUR_DOMAIN>

# TLS certificates — use Let's Encrypt or equivalent
# Example paths for Let's Encrypt (certbot):
#   cert=/etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem
#   pkey=/etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem
cert=/etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem
pkey=/etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem

# Credentials — must match VITE_TURN_USERNAME / VITE_TURN_CREDENTIAL in .env
user=<TURN_USERNAME>:<TURN_PASSWORD>

# Logging
log-file=/var/log/coturn/turnserver.log
simple-log

# Security
fingerprint
lt-cred-mech
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
