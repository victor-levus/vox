# coturn TURN server config
# Replace <YOUR_PUBLIC_IP> and credentials before deploying to production

listening-port=3478
tls-listening-port=5349

# Replace with your server's public IP
# external-ip=<YOUR_PUBLIC_IP>

# Realm — replace with your domain in production
realm=localhost

# Credentials — must match VITE_TURN_USERNAME / VITE_TURN_CREDENTIAL in .env
user=videocall:changeme

# Logging
log-file=/var/log/coturn/turnserver.log
simple-log

# Security
fingerprint
lt-cred-mech
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
