# WireGuard config for your local Ubuntu server (peer/client)
# Place at: /etc/wireguard/wg0.conf on the local machine
#
# Generate keys on the local machine:
#   wg genkey | sudo tee /etc/wireguard/local_private.key | wg pubkey | sudo tee /etc/wireguard/local_public.key
#   sudo chmod 600 /etc/wireguard/local_private.key
#
# Replace <LOCAL_MACHINE_PRIVATE_KEY> with the contents of /etc/wireguard/local_private.key

[Interface]
Address    = 10.10.0.10/24
PrivateKey = <LOCAL_MACHINE_PRIVATE_KEY>

[Peer]
PublicKey           = Vl/kKc3r3N+0kFIYqWoXlrCAUOkFdlXKojUXaevWPW4=
Endpoint            = 162.245.191.102:51820
# Only route VPS WireGuard IP through the tunnel — all other traffic stays local
AllowedIPs          = 10.10.0.1/32
# Keep tunnel alive through NAT
PersistentKeepalive = 25
