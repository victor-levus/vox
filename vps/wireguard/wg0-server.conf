# WireGuard config for the VPS (server/hub)
# Place at: /etc/wireguard/wg0.conf on the VPS
#
# Generate keys on the VPS:
#   wg genkey | tee /etc/wireguard/server_private.key | wg pubkey > /etc/wireguard/server_public.key
#   chmod 600 /etc/wireguard/server_private.key
#
# Replace all <PLACEHOLDER> values before use.

[Interface]
Address    = 10.0.0.1/24
ListenPort = 51820
PrivateKey = <VPS_PRIVATE_KEY>

# Allow traffic to be forwarded from WireGuard to nginx (and vice versa)
PostUp   = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# ── Local machine (your home server / dev machine) ────────────────────────────
[Peer]
PublicKey  = <LOCAL_MACHINE_PUBLIC_KEY>
AllowedIPs = 10.0.0.2/32
