# VPS nginx config — SSL termination + reverse proxy to local machine via WireGuard
# Place at: /etc/nginx/sites-available/vox
# Enable:   ln -s /etc/nginx/sites-available/vox /etc/nginx/sites-enabled/vox
#
# Replace <YOUR_DOMAIN> before use.
# SSL certs are generated by certbot (see setup instructions).

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vps.sleecetechnologies.com.ng;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vps.sleecetechnologies.com.ng;

    ssl_certificate     /etc/letsencrypt/live/vps.sleecetechnologies.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vps.sleecetechnologies.com.ng/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Forward real client IP to the app
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Host            $host;

    # ── Socket.io (WebSocket + long-polling) ──────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://10.10.0.10;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    # ── Everything else (REST API + frontend static files) ────────────────────
    location / {
        proxy_pass         http://10.10.0.10;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
