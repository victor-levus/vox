# coturn — VPS native install
# Place at: /etc/turnserver.conf
# Replace all <PLACEHOLDER> values before starting the service.

listening-port=3478
tls-listening-port=5349

# Must match the VPS public IP — tells coturn which address to advertise to peers
external-ip=162.245.191.102
relay-ip=162.245.191.102

# STUN/TURN realm — use your domain
realm=vox.sleecetechnologies.com.ng
server-name=vox.sleecetechnologies.com.ng

# Static credential auth
# VITE_TURN_USERNAME=vox  VITE_TURN_CREDENTIAL=<TURN_PASSWORD>
user=vox:Agtm2486um3dum

# UDP relay port range — open these in ufw
min-port=49152
max-port=65535

# Logging
log-file=/var/log/turnserver/turnserver.log
simple-log
verbose

# Security hardening
no-cli
no-rfc5780
no-stun-backward-compatibility
response-origin-only-with-rfc5780

# TLS — uncomment after certbot issues a cert
# cert=/etc/letsencrypt/live/vox.sleecetechnologies.com.ng/fullchain.pem
# pkey=/etc/letsencrypt/live/vox.sleecetechnologies.com.ng/privkey.pem
