services:
  db:
    image: mysql:8.0
    container_name: videocall_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-videocall}
      MYSQL_USER: ${MYSQL_USER:-videocall}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - videocall_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videocall_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-videocall}:${MYSQL_PASSWORD:-password}@db:3306/${MYSQL_DATABASE:-videocall}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - videocall_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: videocall_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - videocall_net

  coturn:
    image: coturn/coturn:latest
    container_name: videocall_coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: -c /etc/coturn/turnserver.conf

volumes:
  db_data:

networks:
  videocall_net:
    driver: bridge
